<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>w3dprints.net — Apps</title>
  <style>
    body {
      font-family: system-ui, Segoe UI, Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      /* Full-screen background image for the landing page. */
      background: url('/assets/w3dprintsbackground.png') center / cover no-repeat fixed;
      color: #ffffff;
    }

    main {
      max-width: 42rem;
      margin: 2rem;
      padding: 1.5rem;
      /* Semi-transparent panel keeps text readable over the image. */
      background: rgba(1, 1, 1, 0.45);
      border-radius: 1rem;
      /* Soft blur helps the panel stand out from the background. */
      backdrop-filter: blur(12px);
    }

    .app-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .app-icon {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      width: 6.5rem;
      color: #ffffff;
      text-decoration: none;
      text-align: center;
      gap: 0.5rem;
    }

    .app-icon img,
    .app-icon .placeholder {
      width: 4.5rem;
      height: 4.5rem;
      border-radius: .25rem;
      border: 1px solid rgba(255, 255, 255, 0.85);
      object-fit: cover;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }

    .app-icon .placeholder {
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.0);
      font-weight: 700;
    }

    .app-icon span {
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <main>
    <h1>W3DPrints</h1>
    <p>Apps</p>
    <div class="app-grid">
      <a class="app-icon" href="/apps/next%20trains/">
        <img src="/assets/icons/next-trains.png" alt="Next Trains icon">
        <span>Next Trains</span>
      </a>
      <a class="app-icon" href="/apps/stock-scanner/">
        <span class="placeholder">STK</span>
        <span>Stock Scanner</span>
      </a>
      <a class="app-icon" href="/apps/PointCloudViewer/">
        <span class="placeholder">PC</span>
        <span>Point Cloud Viewer</span>
      </a>
    </div>
    <hr>
    <p>To add an app, create a folder under <code>docs/apps/&lt;app-name&gt;/</code> with an <code>index.html</code>.</p>
  </main>
</body>
</html>
