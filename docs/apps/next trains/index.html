<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEPTA Next Trains</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">SEPTA Regional Rail</p>
        <h1>Next 3 trains between Market East and Paoli</h1>
        <p class="intro">
          Pick which station is the origin and which is the destination, then
          see the next arriving trains from SEPTA's live Next To Arrive feed.
        </p>
      </section>

      <section class="controls-card">
        <form id="trip-form" class="trip-form">
          <label class="field">
            <span>Origin</span>
            <select id="origin" name="origin">
              <option value="marketEast">Market East</option>
              <option value="paoli">Paoli</option>
            </select>
          </label>

          <button
            id="swap-button"
            class="swap-button"
            type="button"
            aria-label="Swap origin and destination"
          >
            Swap
          </button>

          <label class="field">
            <span>Destination</span>
            <select id="destination" name="destination">
              <option value="paoli">Paoli</option>
              <option value="marketEast">Market East</option>
            </select>
          </label>

          <button class="refresh-button" type="submit">Show trains</button>
        </form>

        <div class="meta-row">
          <p id="route-summary" class="route-summary"></p>
          <button id="auto-refresh" class="secondary-button" type="button">
            Auto-refresh: on
          </button>
        </div>
      </section>

      <section class="results-card">
        <div class="results-header">
          <h2>Upcoming trains</h2>
          <p id="last-updated" class="last-updated">Loading live data...</p>
        </div>

        <div id="status-message" class="status-message" aria-live="polite"></div>
        <div id="results" class="results-grid" aria-live="polite"></div>
      </section>
    </main>

    <template id="train-card-template">
      <article class="train-card">
        <div class="train-card-top">
          <p class="train-label">Train</p>
          <div class="train-identifiers">
            <p class="train-number"></p>
            <p class="train-consist"></p>
          </div>
        </div>
        <p class="train-time"></p>
        <div class="details-grid">
          <div>
            <span class="detail-label">Departure</span>
            <p class="detail-value departure-time"></p>
          </div>
          <div>
            <span class="detail-label">Arrival</span>
            <p class="detail-value arrival-time"></p>
          </div>
          <div>
            <span class="detail-label">Status</span>
            <p class="detail-value status-text"></p>
          </div>
          <div>
            <span class="detail-label">Track</span>
            <p class="detail-value track-text"></p>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
